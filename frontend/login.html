<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-[#222831]">

    <form id="loginForm" class="bg-white p-6 rounded-xl shadow-md w-96 space-y-3">

        <img src="../static/images/logo.png" class="w-20 mx-auto" alt="Logo">

        <h1 class="text-2xl font-bold text-center">NoOtterTime (to study)</h1>
        <h2 class="text-lg text-center">Login</h2>

        <div id="messageBox" class="p-2 rounded text-white hidden text-center"></div>

        <input type="text" id="username" placeholder="Username" required class="w-full p-2 border rounded">
        <input type="password" id="password" placeholder="Password" required class="w-full p-2 border rounded">

        <button type="submit" class="w-full bg-[#64CCC5] hover:bg-[#6ad9d2] text-white p-2 rounded">
            Login
        </button>

        <p class="text-sm text-center mt-2">
            Don't have an account?
            <a href="signup.html" class="text-[#64CCC5] hover:underline">
                Sign up
            </a>
        </p>

    </form>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function(event) {
            event.preventDefault(); 

            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const msgBox = document.getElementById("messageBox");

            try {
                const response = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                msgBox.classList.remove("hidden");
                if (response.ok) {
                    msgBox.className = "p-2 rounded text-white text-center bg-green-500";
                    msgBox.innerText = data.message;
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                } else {
                    msgBox.className = "p-2 rounded text-white text-center bg-red-500";
                    msgBox.innerText = data.error;
                }
            } catch (error) {
                console.error("Error:", error);
                msgBox.classList.remove("hidden");
                msgBox.className = "p-2 rounded text-white text-center bg-red-500";
                msgBox.innerText = "Connection error. Is the server running?";
            }
        });
    </script>
</body>
</html>
