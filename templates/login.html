<!DOCTYPE html>

<html>

<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-[#222831]">

    <form method="POST" class="bg-white p-6 rounded-xl shadow-md w-96 space-y-3">

        <!-- Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="w-20 mx-auto">

        <h1 class="text-2xl font-bold text-center">NoOtterTime (to study)</h1>

        <h2 class="text-lg text-center">Login</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, msg in messages %}
        <div class="p-2 rounded text-white
        {% if category == 'error' %} bg-red-500 {% else %} bg-green-500 {% endif %}">
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <input name="username" placeholder="Username" required class="w-full p-2 border rounded">

        <input type="password" name="password" placeholder="Password" required class="w-full p-2 border rounded">

        <button class="w-full bg-[#64CCC5] hover:bg-[#6ad9d2] text-white p-2 rounded">
            Login
        </button>

        <!-- Sign Up -->
        <p class="text-sm text-center mt-2">
            Don't have an account?
            <a href="{{ url_for('signup') }}" class="text-[#64CCC5] hover:underline">
                Sign up
            </a>
        </p>

    </form>

</body>

</html>
